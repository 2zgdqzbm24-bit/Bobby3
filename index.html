<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>黑暗中的呢喃</title>
    <style>
        body {
            background-color: #050505;
            color: #b00000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #story-text {
            max-width: 600px;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
            text-shadow: 0 0 5px rgba(176, 0, 0, 0.5);
        }
        .btn {
            background: transparent;
            border: 1px solid #b00000;
            color: #b00000;
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn:hover {
            background: #b00000;
            color: #000;
            box-shadow: 0 0 15px #b00000;
        }
    </style>
</head>
<body>

    <div id="story-text">你在一間漆黑的房間裡醒來。四周寂靜無聲，只有遠處傳來滴水聲...以及微弱的呼吸聲。那不是你的呼吸聲。</div>
    <div id="choices">
        <button class="btn" onclick="nextScene('search')">摸索牆壁尋找電燈開關</button>
        <button class="btn" onclick="nextScene('stay')">閉上眼睛，假裝什麼都沒聽到</button>
    </div>

    <script>
        const story = {
            search: {
                text: "你顫抖著摸索牆壁。牆面冰冷、黏稠。突然，你摸到了一隻溫熱的手...它反手抓住了你！",
                choices: [
                    { text: "用力掙脫", textId: "escape" },
                    { text: "慘叫", textId: "scream" }
                ]
            },
            stay: {
                text: "你緊閉雙眼。那呼吸聲越來越近...最後，停在你的耳朵旁。一陣冷氣吹過：『我看到你了。』",
                choices: [
                    { text: "重來", textId: "start" }
                ]
            },
            escape: {
                text: "你拼命甩開那隻手，衝向記憶中門的方向。你逃出來了...暫時。 (未完待續)",
                choices: [{ text: "再玩一次", textId: "start" }]
            },
            scream: {
                text: "你剛張開嘴，黑暗中伸出另一隻手死死摀住你的臉。你再也無法發出聲音。",
                choices: [{ text: "重來", textId: "start" }]
            }
        };

        function nextScene(sceneId) {
            if (sceneId === 'start') {
                location.reload();
                return;
            }
            const scene = story[sceneId];
            document.getElementById('story-text').innerText = scene.text;
            
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = choice.text;
                btn.onclick = () => nextScene(choice.textId);
                choicesDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
