<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>深夜廢校 恐怖遊戲</title>
<style>
* {margin:0;padding:0;}
body {overflow:hidden;background:#000;}
canvas {display:block;}
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// 場景、相機、渲染器
let scene,camera,renderer,player,ghost,key,door;
let moveForward=false,moveBack=false,moveLeft=false,moveRight=false;
let hasKey = false;
let gameOver = false;

// 初始化
function init(){
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000,10,50);

  camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.set(0,2,5);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 環境光
  let light = new THREE.AmbientLight(0x222222);
  scene.add(light);

  // 地面
  let floorGeo = new THREE.PlaneGeometry(100,100);
  let floorMat = new THREE.MeshLambertMaterial({color:0x111111});
  let floor = new THREE.Mesh(floorGeo,floorMat);
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // 牆壁
  createWall(0,2,-30,100,5,1);
  createWall(0,2,30,100,5,1);
  createWall(-30,2,0,1,5,100);
  createWall(30,2,0,1,5,100);

  // 玩家碰撞體
  player = new THREE.Group();
  scene.add(player);

  // 女鬼
  let ghostGeo = new THREE.BoxGeometry(1,2,1);
  let ghostMat = new THREE.MeshLambertMaterial({color:0x8888ff,transparent:true,opacity:0.7});
  ghost = new THREE.Mesh(ghostGeo,ghostMat);
  ghost.position.set(5,1,-10);
  scene.add(ghost);

  // 鑰匙
  let keyGeo = new THREE.TorusGeometry(0.3,0.1,8,16);
  let keyMat = new THREE.MeshLambertMaterial({color:0xffff00});
  key = new THREE.Mesh(keyGeo,keyMat);
  key.position.set(-8,1,-5);
  scene.add(key);

  // 逃生門
  let doorGeo = new THREE.BoxGeometry(3,4,1);
  let doorMat = new THREE.MeshLambertMaterial({color:0x442200});
  door = new THREE.Mesh(doorGeo,doorMat);
  door.position.set(-15,2,-20);
  scene.add(door);

  // 鍵盤控制
  document.addEventListener('keydown',e=>{
    if(e.key.toLowerCase()==='w')moveForward=true;
    if(e.key.toLowerCase()==='s')moveBack=true;
    if(e.key.toLowerCase()==='a')moveLeft=true;
    if(e.key.toLowerCase()==='d')moveRight=true;
  });
  document.addEventListener('keyup',e=>{
    if(e.key.toLowerCase()==='w')moveForward=false;
    if(e.key.toLowerCase()==='s')moveBack=false;
    if(e.key.toLowerCase()==='a')moveLeft=false;
    if(e.key.toLowerCase()==='d')moveRight=false;
  });

  // 滑鼠視角
  let mouseX=0;
  document.addEventListener('mousemove',e=>{
    mouseX += e.movementX * 0.003;
    camera.rotation.y = mouseX;
  });

  animate();
}

function createWall(x,y,z,w,h,d){
  let geo = new THREE.BoxGeometry(w,h,d);
  let mat = new THREE.MeshLambertMaterial({color:0x333333});
  let wall = new THREE.Mesh(geo,mat);
  wall.position.set(x,y,z);
  scene.add(wall);
}

// 碰撞距離
function getDist(obj1,obj2){
  let dx = obj1.position.x - obj2.position.x;
  let dz = obj1.position.z - obj2.position.z;
  return Math.sqrt(dx*dx+dz*dz);
}

function animate(){
  requestAnimationFrame(animate);
  if(gameOver)return;

  // 玩家移動
  let speed = 0.15;
  let angle = camera.rotation.y;
  if(moveForward){
    camera.position.x += Math.sin(angle)*speed;
    camera.position.z += Math.cos(angle)*speed;
  }
  if(moveBack){
    camera.position.x -= Math.sin(angle)*speed;
    camera.position.z -= Math.cos(angle)*speed;
  }
  if(moveLeft)camera.position.x -= speed;
  if(moveRight)camera.position.x += speed;

  // 女鬼追人
  let dx = camera.position.x - ghost.position.x;
  let dz = camera.position.z - ghost.position.z;
  ghost.position.x += dx*0.02;
  ghost.position.z += dz*0.02;

  // 撿鑰匙
  if(!hasKey && getDist(camera,key)<2){
    hasKey = true;
    scene.remove(key);
    alert('撿到鑰匙！快去逃生門！');
  }

  // 勝利
  if(hasKey && getDist(camera,door)<3){
    gameOver=true;
    alert('逃離成功！通關！');
  }

  // 被鬼抓到
  if(getDist(camera,ghost)<1.5){
    gameOver=true;
    alert('被女鬼抓到！遊戲結局：被困廢校');
  }

  renderer.render(scene,camera);
}

init();
</script>
</body>
</html>
